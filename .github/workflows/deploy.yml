# Github Actions deploy workflow

name: Deployment
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # ── Cheatsheet ──────────────────────────────────────────────────────────
      - name: Install — Cheatsheet
        run: cd ui-cheatsheet && npm install

      - name: Build — Cheatsheet
        run: cd ui-cheatsheet && npm run build

      # ── Quiz ────────────────────────────────────────────────────────────────
      - name: Install — Quiz
        run: cd ui-practice && npm install

      - name: Build — Quiz
        run: cd ui-practice && npm run build

      # ── Arcade ──────────────────────────────────────────────────────────────
      - name: Install — Arcade
        run: cd ui-arcade && npm install

      - name: Test — Arcade engine
        run: cd ui-arcade && npm test

      - name: Build — Arcade
        run: cd ui-arcade && npm run build

      # ── Assemble deployment ─────────────────────────────────────────────────
      - name: Prepare deployment structure
        run: |
          mkdir -p deploy

          # Main site (cheatsheet)
          cp -r ui-cheatsheet/dist/* deploy/

          # Quiz at /game
          mkdir -p deploy/game
          cp -r ui-practice/dist/* deploy/game/

          # Arcade at /arcade
          mkdir -p deploy/arcade
          cp -r ui-arcade/dist/* deploy/arcade/

          echo "Deployment structure:"
          find deploy -type f | head -30

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./deploy
          github_token: ${{ secrets.GITHUB_TOKEN }}
