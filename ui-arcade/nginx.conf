server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # The app is served under /learn-vim/arcade/ base path
    location /learn-vim/arcade/ {
        try_files $uri $uri/ /learn-vim/arcade/index.html;
    }

    # Redirect bare root to the app
    location = / {
        return 301 /learn-vim/arcade/;
    }

    # Aggressive caching for hashed assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for index.html so the app always fetches the latest shell
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
